# NeuraRoute scheduler policy — the cost-function weights, hot-reloadable.
# Cost(device) = wL·latency + wE·energy + wC·cloud_cost − wP·privacy   (lower = better, argmin).
# Flip the active profile live:  POST /policy {"profile": "battery_saver"}  — this is the demo's policy toggle.
active_profile: speed_first

profiles:
  speed_first:      # latency dominates → willing to spend battery/cloud for speed
    wL: 0.6
    wE: 0.1
    wC: 0.2
    wP: 0.3
  battery_saver:    # energy dominates → keep work off draining batteries
    wL: 0.2
    wE: 0.6
    wC: 0.2
    wP: 0.3
